services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      ND_LOGLEVEL: info
    volumes:
      - /opt/hemmaos/data/navidrome/data:/data
      - /opt/hemmaos/data/media/music:/music:ro
    networks:
      - hemmaos

networks:
  hemmaos:
    external: true
