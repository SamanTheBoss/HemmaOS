services:
  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Europe/Stockholm
    volumes:
      - /opt/hemmaos/data/radarr/config:/config
      - /opt/hemmaos/data/media/movies:/movies
      - /opt/hemmaos/data/media/downloads:/downloads
    networks:
      - hemmaos

networks:
  hemmaos:
    external: true
