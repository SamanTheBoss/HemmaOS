services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - /opt/hemmaos/data/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - hemmaos

networks:
  hemmaos:
    external: true
