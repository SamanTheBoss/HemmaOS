services:
  # Frontend Dashboard (Next.js)
  web:
    container_name: hemmaos-web
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - hemmaos

  # Backend API (Express)
  api:
    container_name: hemmaos-api
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/hemmaos:/opt/hemmaos
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TAILSCALE_DOMAIN=${TAILSCALE_DOMAIN:-localhost}
      - TAILSCALE_SUPPORT_KEY=${TAILSCALE_SUPPORT_KEY:-}
    networks:
      - hemmaos

  # Reverse Proxy (Caddy)
  caddy:
    container_name: hemmaos-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/hemmaos/config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    networks:
      - hemmaos

volumes:
  caddy-data:
  caddy-config:

networks:
  hemmaos:
    name: hemmaos
    driver: bridge
